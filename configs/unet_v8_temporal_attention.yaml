# ========================================
# U-Net V8 配置文件
# ========================================
# 模型名称: AudioUNet5TemporalAttention
# 描述: 5层U-Net + 时间注意力机制
# 特点: 动态关注不同时间帧的重要性
# 适用场景: 需要关注特定时间段的啸叫抑制
# ========================================

# ========== 模型配置 ==========
model:
  name: unet_v8_temporal_attention
  class_name: AudioUNet5TemporalAttention
  description: "5层U-Net + 时间注意力机制"
  attention_heads: 8         # 注意力头数

# ========== 训练参数 ==========
training:
  # 基础训练参数
  learning_rate: 0.0001      # 学习率
  batch_size: 8              # 批大小
  num_epochs: 50             # 训练轮数
  num_workers: 2             # 数据加载线程数
  weight_decay: 1.0e-5       # 权重衰减

  # 学习率调度器
  lr_scheduler:
    type: "plateau"          # ReduceLROnPlateau
    factor: 0.5
    patience: 3

# ========== 损失函数配置 ==========
loss:
  type: "spectral"           # 频谱损失

# ========== 数据增强配置 ==========
augmentation:
  enabled: true
  spec_augment:
    freq_masking: true
    time_masking: true

# ========== 后处理配置 ==========
post_processing:
  enabled: false

# ========== 实验信息 ==========
experiment:
  name: "temporal_attention_unet_v8"
  description: "带时间注意力机制的U-Net"
