# ========================================
# U-Net V12 配置文件
# ========================================
# 模型名称: AudioUNet5Pyramid
# 描述: 金字塔池化U-Net
# 特点: 金字塔池化模块聚合多尺度上下文信息
# 适用场景: 需要全局上下文信息的场景
# ========================================

# ========== 模型配置 ==========
model:
  name: unet_v12_pyramid
  class_name: AudioUNet5Pyramid
  description: "5层U-Net + 金字塔池化模块"
  pyramid_levels: [1, 2, 3, 6]  # 金字塔层级
  reduction_ratio: 4            # 通道缩减比率

# ========== 训练参数 ==========
training:
  # 基础训练参数
  learning_rate: 0.0001
  batch_size: 8
  num_epochs: 100
  num_workers: 4
  weight_decay: 0.0001

  # 学习率调度器
  lr_scheduler:
    type: "cosine_warmup"
    warmup_epochs: 5
    min_lr: 0.000001
    T_max: 100

  # 混合精度训练
  mixed_precision:
    enabled: true

  # 梯度裁剪
  gradient_clip: 1.0

# ========== 损失函数配置 ==========
loss:
  type: "multitask"
  weights:
    spectral: 0.5
    l1: 0.3
    mse: 0.2

# ========== 数据增强配置 ==========
augmentation:
  enabled: true
  audio_augment:
    enabled: true
    noise_levels: [0.001, 0.01, 0.02, 0.05]
    volume_factors: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3]
    max_shift_ratio: 0.1
  spec_augment:
    freq_mask_param: 20
    time_mask_param: 20

# ========== 后处理配置 ==========
post_processing:
  enabled: false

# ========== 实验信息 ==========
experiment:
  name: "pyramid_unet_v12"
  description: "金字塔池化U-Net"
