# ========================================
# U-Net V2 配置文件
# ========================================
# 模型名称: AudioUNet5
# 描述: 5层基线U-Net
# 特点: 标准U-Net架构，本项目默认模型
# 适用场景: 通用音频啸叫抑制
# ========================================

# ========== 模型配置 ==========
model:
  name: unet_v2
  class_name: AudioUNet5
  description: "5层基线U-Net"

# ========== 训练参数 ==========
training:
  # 基础训练参数
  learning_rate: 0.0001      # 学习率
  batch_size: 8              # 批大小
  num_epochs: 50             # 训练轮数
  num_workers: 2             # 数据加载线程数
  weight_decay: 1.0e-5       # 权重衰减

  # 学习率调度器
  lr_scheduler:
    type: "plateau"          # 调度器类型
    factor: 0.5              # 衰减因子
    patience: 3              # 等待轮数

# ========== 损失函数配置 ==========
loss:
  type: "l1"                 # 损失函数类型

# ========== 数据增强配置 ==========
augmentation:
  enabled: false             # 基线模型不使用增强

# ========== 后处理配置 ==========
post_processing:
  enabled: false             # 基线模型不使用后处理

# ========== 实验信息 ==========
experiment:
  name: "baseline_unet_v2"
  description: "5层U-Net基线模型（默认）"
  notes: "这是项目推荐的标准配置"
