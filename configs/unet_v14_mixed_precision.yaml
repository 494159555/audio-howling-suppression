# UNet V14: 混合精度训练配置
# 使用PyTorch AMP加速训练

model:
  name: "AudioUNet5"
  in_channels: 1
  out_channels: 1

training:
  epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 1.0e-5
  
  # 混合精度训练配置
  use_mixed_precision: true
  amp_enabled: true

# 学习率调度
lr_scheduler:
  type: "plateau"  # 使用标准的ReduceLROnPlateau
  factor: 0.5
  patience: 3

# 损失函数
loss:
  type: "l1"

# 数据增强
augmentation:
  enabled: false

# 后处理
post_processing:
  enabled: false

# 实验描述
description: "UNet V5 with mixed precision training (AMP)"