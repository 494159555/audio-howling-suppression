# UNet V15: 课程学习配置
# 从简单到复杂逐步训练

model:
  name: "AudioUNet5"
  in_channels: 1
  out_channels: 1

training:
  epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 1.0e-5
  
  # 课程学习配置
  use_curriculum_learning: true
  curriculum_total_epochs: 50
  curriculum_schedule_type: "step"  # 'step', 'linear', 'exponential'
  
  # 难度级别（从低到高）
  curriculum_difficulty_levels:
    - noise_level: 0.01  # 简单：低噪声
    - noise_level: 0.05  # 中等：中等噪声
    - noise_level: 0.10  # 困难：高噪声
    - noise_level: 0.20  # 极难：极高噪声

# 学习率调度
lr_scheduler:
  type: "plateau"
  factor: 0.5
  patience: 3

# 损失函数
loss:
  type: "l1"

# 数据增强
augmentation:
  enabled: false

# 后处理
post_processing:
  enabled: false

# 实验描述
description: "UNet V5 with curriculum learning (step schedule)"