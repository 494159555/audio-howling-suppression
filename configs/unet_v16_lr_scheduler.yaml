# UNet V16: 高级学习率调度配置
# 使用Cosine Annealing + Warmup和One Cycle Policy

model:
  name: "AudioUNet5"
  in_channels: 1
  out_channels: 1

training:
  epochs: 50
  batch_size: 8
  learning_rate: 0.0001
  weight_decay: 1.0e-5

# 学习率调度配置
lr_scheduler:
  type: "cosine_warmup"  # 可选: 'cosine_warmup', 'one_cycle', 'plateau', 'step'
  
  # Cosine Annealing + Warmup 参数
  warmup_epochs: 5
  base_lr: 0.0001
  min_lr: 0.000001
  
  # One Cycle 参数（如果type='one_cycle'）
  max_lr: 0.001
  pct_start: 0.3
  div_factor: 25.0
  final_div_factor: 10000.0
  
  # Step 参数（如果type='step'）
  step_size: 10
  gamma: 0.1

# 损失函数
loss:
  type: "l1"

# 数据增强
augmentation:
  enabled: false

# 后处理
post_processing:
  enabled: false

# 实验描述
description: "UNet V5 with cosine annealing + warmup scheduler"