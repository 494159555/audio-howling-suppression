# ========================================
# U-Net V4 配置文件
# ========================================
# 模型名称: AudioUNet5Residual
# 描述: 5层U-Net + 残差连接
# 特点: 残差连接改善梯度传播，支持更深层网络
# 适用场景: 需要更深层网络的场景
# ========================================

# ========== 模型配置 ==========
model:
  name: unet_v4_residual
  class_name: AudioUNet5Residual
  description: "5层U-Net + 残差连接"

# ========== 训练参数 ==========
training:
  # 基础训练参数
  learning_rate: 0.0001      # 学习率
  batch_size: 8              # 批大小
  num_epochs: 50             # 训练轮数
  num_workers: 2             # 数据加载线程数
  weight_decay: 1.0e-5       # 权重衰减

  # 学习率调度器
  lr_scheduler:
    type: "plateau"
    factor: 0.5
    patience: 3

# ========== 损失函数配置 ==========
loss:
  type: "multitask"          # 残差网络推荐多任务损失
  weights:
    spectral: 0.5
    l1: 0.3
    mse: 0.2

# ========== 数据增强配置 ==========
augmentation:
  enabled: false

# ========== 后处理配置 ==========
post_processing:
  enabled: false

# ========== 实验信息 ==========
experiment:
  name: "residual_unet_v4"
  description: "带残差连接的U-Net"
