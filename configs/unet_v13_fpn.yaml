# ========================================
# U-Net V13 配置文件
# ========================================
# 模型名称: AudioUNet5FPN
# 描述: 特征金字塔网络U-Net
# 特点: FPN架构实现多尺度特征融合
# 适用场景: 需要强语义和精细节的场景
# ========================================

# ========== 模型配置 ==========
model:
  name: unet_v13_fpn
  class_name: AudioUNet5FPN
  description: "5层U-Net + 特征金字塔网络"
  fpn_channels: 64            # FPN通道数
  use_fpn_fusion: true        # 启用FPN融合

# ========== 训练参数 ==========
training:
  # 基础训练参数
  learning_rate: 0.0001
  batch_size: 8
  num_epochs: 100
  num_workers: 4
  weight_decay: 0.0001

  # 学习率调度器
  lr_scheduler:
    type: "cosine_warmup"
    warmup_epochs: 5
    min_lr: 0.000001
    T_max: 100

  # 混合精度训练
  mixed_precision:
    enabled: true

  # 梯度裁剪
  gradient_clip: 1.0

# ========== 损失函数配置 ==========
loss:
  type: "multitask"
  weights:
    spectral: 0.5
    l1: 0.3
    mse: 0.2

# ========== 数据增强配置 ==========
augmentation:
  enabled: true
  audio_augment:
    enabled: true
    noise_levels: [0.001, 0.01, 0.02, 0.05]
    volume_factors: [0.7, 0.8, 0.9, 1.0, 1.1, 1.2, 1.3]
    max_shift_ratio: 0.1
  spec_augment:
    freq_mask_param: 20
    time_mask_param: 20

# ========== 后处理配置 ==========
post_processing:
  enabled: false

# ========== 实验信息 ==========
experiment:
  name: "fpn_unet_v13"
  description: "特征金字塔网络U-Net"
